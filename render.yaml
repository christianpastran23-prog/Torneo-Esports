# Render Blueprint educativo (Free): 6 Web Services públicos.
# Reemplazar "demo" por un nombre propio o identificador corto y único que te identifique.
# Eureka se conserva para Docker local, pero se desactiva en Render Free.
services:
  - type: web
    name: com-fullstack-auth
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/cliente-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false

  - type: web
    name: demo-fullstack-producto
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/producto-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false

  - type: web
    name: demo-fullstack-pedido
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/pedido-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: APP_DISCOVERY_ENABLED
        value: false
      - key: CLIENTE_SERVICE_URL
        value: https://demo-fullstack-cliente.onrender.com
      - key: PRODUCTO_SERVICE_URL
        value: https://demo-fullstack-producto.onrender.com

  - type: web
    name: demo-fullstack-pago
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/pago-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: APP_DISCOVERY_ENABLED
        value: false
      - key: PEDIDO_SERVICE_URL
        value: https://demo-fullstack-pedido.onrender.com

  - type: web
    name: demo-fullstack-despacho
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/despacho-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: APP_DISCOVERY_ENABLED
        value: false
      - key: PEDIDO_SERVICE_URL
        value: https://demo-fullstack-pedido.onrender.com

  - type: web
    name: demo-fullstack-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/api-gateway.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: CLIENTE_SERVICE_URL
        value: https://demo-fullstack-cliente.onrender.com
      - key: PRODUCTO_SERVICE_URL
        value: https://demo-fullstack-producto.onrender.com
      - key: PEDIDO_SERVICE_URL
        value: https://demo-fullstack-pedido.onrender.com
      - key: PAGO_SERVICE_URL
        value: https://demo-fullstack-pago.onrender.com
      - key: DESPACHO_SERVICE_URL
        value: https://demo-fullstack-despacho.onrender.com
