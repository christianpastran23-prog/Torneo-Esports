# src/main/resources/application-dev.properties

# Cambia "tu_base_datos_dev" por el nombre real de la base de datos nueva que creaste
spring.datasource.url=jdbc:mysql://localhost:3306/tu_base_datos_dev?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Esto asegura que Flyway (si lo usas) también apunte aquí
spring.flyway.baseline-on-migrate=true