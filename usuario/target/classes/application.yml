server:
  port: 8082

spring:
  application:
    name: usuario

  datasource:
    url: jdbc:mysql://db-mysql:3306/db_torneo_esports
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_usuario
    baseline-version: "0"

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Se eliminó la línea del dialecto para que use el default de Hibernate 6

jwt:
  secret: laClaveDeLosEsportsEstanLargaLoSuficiente

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc: # <-- Corregido sin espacio
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html