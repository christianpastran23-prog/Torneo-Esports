      context: ./inscripcion
      dockerfile: Dockerfile
    container_name: inscripcion-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - usuario
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_USER}:${DB_PASSWORD}@torneo-esports-db1-torneo-esports.e.aivencloud.com:20740/defaultdb?ssl-mode=REQUIRED
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
    networks:
      - torneo-network

  torneo:
    build:
      context: ./torneo
      dockerfile: Dockerfile
    container_name: torneo-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_USER}:${DB_PASSWORD}@torneo-esports-db1-torneo-esports.e.aivencloud.com:20740/defaultdb?ssl-mode=REQUIRED
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - torneo-network

  historial-juego:
    build:
      context: ./historial-juego
      dockerfile: Dockerfile
    container_name: historial-juego-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
